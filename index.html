<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álex Méndez — Product Designer & Design Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --border:  #30363d;
    --prompt:  #f78166;
    --cmd:     #e6edf3;
    --output:  #8b949e;
    --green:   #3fb950;
    --blue:    #58a6ff;
    --yellow:  #d29922;
    --orange:  #f0883e;
    --dim:     #484f58;
  }
  body {
    background: var(--bg);
    color: var(--cmd);
    font-family: 'VT323', monospace;
    font-size: 17px;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 72px;
  }
  /* Escaneo de líneas estilo monitor antiguo */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
    pointer-events: none;
    z-index: 9999;
  }
  .window {
    width: 100%;
    max-width: 860px;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 12px 56px rgba(0,0,0,0.75);
  }
  .titlebar {
    background: #21262d;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 9px 14px;
    gap: 8px;
  }
  .dots { display: flex; gap: 7px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }
  .tlabel { flex: 1; text-align: center; color: var(--output); font-size: 14px; }
  
  .lang-switch { display: flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .lang-btn { font-family: 'VT323', monospace; font-size: 14px; padding: 2px 9px; cursor: pointer; background: transparent; border: none; color: var(--dim); }
  .lang-btn.active { background: var(--orange); color: #0d1117; }

  .term { background: var(--bg); padding: 22px 26px 32px; }
  
  /* Ajuste de la foto para que no se aplaste */
  .header-row { display: flex; align-items: center; gap: 24px; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .avatar-wrap { 
    width: 120px; 
    height: 120px; 
    flex-shrink: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .avatar-wrap img { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; /* Mantiene la proporción sin aplastar */
    image-rendering: pixelated; 
  }

  .hname { font-size: 38px; color: var(--cmd); line-height: 1; }
  .htitle { font-size: 20px; color: var(--green); margin-top: 4px; }
  .hloc { font-size: 17px; color: var(--output); margin-top: 4px; }

  .pline { display: flex; align-items: center; gap: 9px; margin-bottom: 5px; opacity: 0; transition: opacity 0.1s; }
  .pline.show { opacity: 1; }
  .ps1 { color: var(--prompt); font-size: 19px; }
  .pcmd { color: var(--cmd); font-size: 19px; }
  .cur { display: inline-block; width: 10px; height: 19px; background: var(--cmd); animation: blink 1s step-start infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .oblock { margin-bottom: 18px; opacity: 0; transition: opacity 0.25s; }
  .oblock.show { opacity: 1; }
  .oline { color: var(--output); font-size: 17px; line-height: 1.6; }
  .oline.w { color: var(--cmd); }
  .oline.g { color: var(--green); }

  .pbox { border: 1px solid var(--border); border-left: 3px solid var(--orange); background: var(--surface); padding: 14px; margin: 8px 0; border-radius: 0 4px 4px 0; opacity: 0; transition: 0.3s; }
  .pbox.show { opacity: 1; }
  .ptitle { color: var(--orange); font-size: 20px; font-weight: bold; }
  .prole { color: var(--yellow); font-size: 16px; margin-bottom: 6px; }
  .ptags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .tag { background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.3); color: var(--blue); font-size: 14px; padding: 2px 8px; border-radius: 3px; }
  
  .clinks a { color: var(--blue); text-decoration: none; font-size: 18px; display: block; margin-bottom: 4px; }
  .clinks a::before { content: "→ "; color: var(--dim); }

  .dl-btn { display: inline-block; background: rgba(240,136,62,0.15); border: 1px solid var(--orange); color: var(--orange); padding: 4px 12px; border-radius: 4px; text-decoration: none; margin-top: 8px; }
  .dl-btn:hover { background: var(--orange); color: #000; }

  @media (max-width: 600px) { .header-row { flex-direction: column; text-align: center; } }
</style>
</head>
<body>

<div class="window">
  <div class="titlebar">
    <div class="dots"><div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div></div>
    <div class="tlabel">amendez83/resume — bash</div>
    <div class="lang-switch">
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">ENG</button>
      <button class="lang-btn" id="btn-es" onclick="setLang('es')">ESP</button>
    </div>
  </div>
  <div class="term">
    <div class="header-row">
      <div class="avatar-wrap">
        <img src="https://amendez83.github.io/resume/CV/Captura%20de%20pantalla%202026-04-07%20a%20las%2010.59.09.jpg" alt="Álex Méndez">
      </div>
      <div class="htext">
        <div class="hname" id="hname"></div>
        <div class="htitle" id="htitle"></div>
        <div class="hloc" id="hloc"></div>
      </div>
    </div>
    <div id="term-content"></div>
  </div>
</div>

<script>
const DATA = {
  en: {
    title: "Product Designer \xb7 Design Engineer",
    location: "Madrid, Spain",
    about: [
      "Senior Product Designer with 12+ years shipping enterprise SaaS",
      "in high-stakes fintech. Deep expertise in design systems \u2014",
      "token architecture, component libraries, design-to-code delivery.",
      "Growing toward Design Engineering: HTML/CSS, Style Dictionary,",
      "WCAG 2.1 AA. AI-augmented workflows: Supabase, Claude, GitHub."
    ],
    work: [
      { id: "ria", title: "Ria Money Transfer \xb7 Euronet", role: "Lead Product Designer (2022\u2013Present)", desc: "Led end-to-end product design for Ria\u2019s internal B2B SaaS platform used by agents in 160+ countries. Built the design token architecture in Figma and established WCAG 2.1 AA standards.", tags: ["Design Systems", "Figma", "Tokens Studio", "WCAG 2.1 AA"] },
      { id: "openbank", title: "Openbank \xb7 Santander Group", role: "Design System Specialist (2020\u20132022)", desc: "Designed the 3-layer token architecture and 60+ components for Spain's largest digital bank. Achieved 1:1 design-to-code parity with React squads.", tags: ["Style Dictionary", "React", "UI Analytics"] },
      { id: "globant", title: "Globant", role: "Senior UI Designer (2016\u20132020)", desc: "Optimised UIs for mobile apps and enterprise dashboards. Led discovery workshops and high-fidelity prototyping for engineering teams.", tags: ["Product Design", "Mobile", "Prototyping"] }
    ],
    cv_label: "2-page PDF \u2014 Product Designer & Design Engineer",
    cv_text: "↓ Download CV"
  },
  es: {
    title: "Diseñador de Producto \xb7 Design Engineer",
    location: "Madrid, España",
    about: [
      "Diseñador de Producto Senior con +12 años lanzando SaaS",
      "enterprise en fintech de alto impacto. Experto en sistemas de",
      "diseño: tokens, librerías de componentes, entrega diseño-código.",
      "Creciendo hacia Design Engineering: HTML/CSS, Style Dictionary,",
      "WCAG 2.1 AA. Flujos aumentados con IA: Supabase, Claude, GitHub."
    ],
    work: [
      { id: "ria", title: "Ria Money Transfer \xb7 Euronet", role: "Lead Product Designer (2022\u2013Presente)", desc: "Lideré el diseño end-to-end de la plataforma B2B SaaS usada en 160+ países. Construí la arquitectura de tokens en Figma y el primer estándar WCAG 2.1 AA.", tags: ["Sistemas de Diseño", "Figma", "Tokens Studio", "Accesibilidad"] },
      { id: "openbank", title: "Openbank \xb7 Grupo Santander", role: "Especialista en Design System (2020\u20132022)", desc: "Diseñé el sistema de tokens de 3 capas para el mayor banco digital de España. Logré paridad 1:1 diseño-código con equipos de React.", tags: ["Style Dictionary", "React", "Gobernanza"] },
      { id: "globant", title: "Globant", role: "Senior UI Designer (2016\u20132020)", desc: "Optimización de interfaces para apps móviles y dashboards enterprise. Lideré workshops de discovery y prototipado de alta fidelidad.", tags: ["Diseño de Producto", "Móvil", "Prototipado"] }
    ],
    cv_label: "PDF 2 páginas \u2014 Diseñador de Producto & Design Engineer",
    cv_text: "↓ Descargar CV"
  }
};

let currentLang = 'en';
const container = document.getElementById("term-content");

const wait = ms => new Promise(res => setTimeout(res, ms));

async function typeInto(el, text, speed = 30) {
  for (let char of text) { el.textContent += char; await wait(speed); }
}

function makePrompt(cmdText) {
  const line = document.createElement("div"); line.className = "pline show";
  line.innerHTML = `<span class="ps1">❯</span> <span class="pcmd"></span><span class="cur"></span>`;
  container.appendChild(line);
  return line.querySelector(".pcmd");
}

async function run() {
  container.innerHTML = "";
  const d = DATA[currentLang];

  // whoami
  const c1 = makePrompt(); await typeInto(c1, "whoami");
  const o1 = document.createElement("div"); o1.className = "oblock show";
  o1.innerHTML = `<div class="oline w">ÁLEX MÉNDEZ</div><div class="oline g">${d.title}</div><div class="oline">${d.location}</div>`;
  container.appendChild(o1);
  await wait(500);

  // about
  const c2 = makePrompt(); await typeInto(c2, "cat about.txt");
  const o2 = document.createElement("div"); o2.className = "oblock show";
  d.about.forEach(l => o2.innerHTML += `<div class="oline">${l}</div>`);
  container.appendChild(o2);
  await wait(500);

  // work
  const c3 = makePrompt(); await typeInto(c3, "ls work/");
  d.work.forEach(p => {
    const box = document.createElement("div"); box.className = "pbox show";
    box.innerHTML = `<div class="ptitle">${p.title}</div><div class="prole">${p.role}</div><div class="oline">${p.desc}</div><div class="ptags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`;
    container.appendChild(box);
  });
  await wait(500);

  // downloads
  const c4 = makePrompt(); await typeInto(c4, "ls downloads/");
  const o4 = document.createElement("div"); o4.className = "oblock show";
  o4.innerHTML = `<div class="oline">${d.cv_label}</div><a href="#" class="dl-btn">${d.cv_text}</a>`;
  container.appendChild(o4);
  await wait(500);

  // contact
  const c5 = makePrompt(); await typeInto(c5, "cat contact.txt");
  const o5 = document.createElement("div"); o5.className = "oblock show clinks";
  o5.innerHTML = `
    <a href="https://linkedin.com/in/amendez83" target="_blank">linkedin.com/in/amendez83</a>
    <a href="https://behance.net/amendez" target="_blank">behance.net/amendez</a>
    <a href="mailto:amendez83@gmail.com">amendez83@gmail.com</a>
  `;
  container.appendChild(o5);
}

function setLang(lang) {
  currentLang = lang;
  document.getElementById("btn-en").className = lang==='en'?'lang-btn active':'lang-btn';
  document.getElementById("btn-es").className = lang==='es'?'lang-btn active':'lang-btn';
  
  // Reset header
  document.getElementById("hname").textContent = "";
  document.getElementById("htitle").textContent = "";
  document.getElementById("hloc").textContent = "";
  
  initHeader();
}

async function initHeader() {
  await typeInto(document.getElementById("hname"), "ÁLEX MÉNDEZ");
  await typeInto(document.getElementById("htitle"), DATA[currentLang].title);
  await typeInto(document.getElementById("hloc"), DATA[currentLang].location);
  run();
}

window.onload = initHeader;
</script>

</body>
</html>
