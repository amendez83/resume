<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álex Méndez — Product Designer & Design Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --border:  #30363d;
    --prompt:  #f78166;
    --cmd:     #e6edf3;
    --output:  #8b949e;
    --green:   #3fb950;
    --blue:    #58a6ff;
    --yellow:  #d29922;
    --orange:  #f0883e;
    --dim:     #484f58;
  }
  body {
    background: var(--bg);
    color: var(--cmd);
    font-family: 'VT323', monospace;
    font-size: 17px;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 72px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
    pointer-events: none;
    z-index: 9999;
  }
  .window {
    width: 100%;
    max-width: 860px;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 12px 56px rgba(0,0,0,0.75);
  }
  .titlebar {
    background: #21262d;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 9px 14px;
    gap: 8px;
    user-select: none;
  }
  .dots { display: flex; gap: 7px; flex-shrink: 0; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }
  .tlabel { flex: 1; text-align: center; color: var(--output); font-size: 14px; letter-spacing: 0.4px; }
  
  .lang-switch { display: flex; align-items: center; gap: 1px; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .lang-btn { font-family: 'VT323', monospace; font-size: 14px; padding: 2px 9px; cursor: pointer; background: transparent; border: none; color: var(--dim); }
  .lang-btn.active { background: var(--orange); color: #0d1117; }
  
  .term { background: var(--bg); padding: 22px 26px 32px; }
  .header-row { display: flex; align-items: center; gap: 28px; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  
  canvas#av { image-rendering: pixelated; flex-shrink: 0; display: block; }
  
  .htext { padding-top: 2px; }
  .hname  { font-size: 38px; color: var(--cmd); letter-spacing: 1px; line-height: 1; min-height: 40px; }
  .htitle { font-size: 20px; color: var(--green); margin-top: 4px; min-height: 22px; }
  .hloc   { font-size: 17px; color: var(--output); margin-top: 5px; min-height: 18px; }

  /* Terminal lines */
  .pline { display: flex; align-items: center; gap: 9px; margin-bottom: 5px; opacity: 0; transition: opacity 0.1s; }
  .pline.show { opacity: 1; }
  .ps1 { color: var(--prompt); font-size: 19px; }
  .pcmd { color: var(--cmd); font-size: 19px; }
  .cur { display: inline-block; width: 10px; height: 19px; background: var(--cmd); vertical-align: middle; animation: blink 1s step-start infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .oblock { margin-bottom: 18px; opacity: 0; transform: translateY(4px); transition: opacity 0.25s, transform 0.25s; }
  .oblock.show { opacity: 1; transform: none; }
  .oline { color: var(--output); font-size: 17px; line-height: 1.6; }
  .oline.w { color: var(--cmd); }
  .oline.g { color: var(--green); }
  .pbox { border: 1px solid var(--border); border-left: 3px solid var(--orange); background: var(--surface); padding: 12px 16px; margin: 8px 0; border-radius: 0 4px 4px 0; opacity: 0; transform: translateY(4px); transition: opacity 0.3s, transform 0.3s; }
  .pbox.show { opacity: 1; transform: none; }
  .ptitle { color: var(--orange); font-size: 19px; font-weight: bold; }
  .prole { color: var(--yellow); font-size: 16px; margin-bottom: 4px; }
  .ptags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .tag { background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.28); color: var(--blue); font-size: 13px; padding: 1px 7px; border-radius: 3px; }
  .clinks a { color: var(--blue); text-decoration: none; font-size: 17px; }
  .clinks a::before { content: "→ "; color: var(--dim); }

  @media (max-width: 600px) {
    .header-row { flex-direction: column; text-align: center; }
  }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">
    <div class="dots"><div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div></div>
    <div class="tlabel">amendez83/resume &mdash; bash</div>
    <div class="lang-switch">
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">ENG</button>
      <button class="lang-btn" id="btn-es" onclick="setLang('es')">ESP</button>
    </div>
  </div>
  <div class="term">
    <div class="header-row">
      <canvas id="av"></canvas>
      <div class="htext">
        <div class="hname" id="hname"></div>
        <div class="htitle" id="htitle"></div>
        <div class="hloc" id="hloc"></div>
      </div>
    </div>
    <div id="term"></div>
  </div>
</div>

<script>
"use strict";

// ── PIXEL ART GENERATOR ───────────────────────────────────────────────────
(function() {
  var S = 7, W = 16, H = 20;
  var T="T", GH="#3c584c", SK="#eead88", S2="#cd8b66", GR="#a0ffe0", GL="#1a1a1a", EY="#ffffff", PU="#333333", BD="#3c584c", WT="#f0f8ff", WS="#d0d8df", LG="#405058";
  var g = [
    [T,T,T,GH,GH,GH,GH,GH,GH,GH,GH,GH,T,T,T,T],[T,T,GH,GH,GH,GH,GH,GH,GH,GH,GH,GH,GH,T,T,T],[T,GH,GH,GH,GH,GH,GH,GH,GH,GH,GH,GH,GH,GH,T,T],[GH,GH,GH,GH,GH,GH,GH,GH,GH,GH,GH,GH,GH,GH,GH,T],[GH,GH,GH,SK,SK,SK,SK,SK,SK,SK,SK,SK,GH,GH,GH,T],[T,GH,SK,SK,SK,SK,SK,SK,SK,SK,SK,SK,SK,GH,T,T],[T,GH,SK,GL,GL,SK,SK,SK,SK,SK,GL,GL,SK,GH,T,T],[T,SK,GR,GR,GR,GR,SK,SK,SK,GR,GR,GR,GR,SK,T,T],[T,SK,GR,EY,PU,GR,SK,SK,SK,GR,EY,PU,GR,SK,T,T],[T,SK,GR,GR,GR,GR,SK,SK,SK,GR,GR,GR,GR,SK,T,T],[T,S2,SK,SK,SK,SK,SK,SK,SK,SK,SK,SK,SK,S2,T,T],[T,BD,SK,SK,SK,SK,SK,SK,SK,SK,SK,SK,SK,BD,T,T],[T,BD,BD,BD,SK,BD,BD,BD,BD,BD,SK,BD,BD,BD,T,T],[T,BD,BD,BD,BD,BD,BD,BD,BD,BD,BD,BD,BD,BD,T,T],[T,T,BD,BD,BD,BD,BD,BD,BD,BD,BD,BD,BD,T,T,T],[T,T,BD,BD,BD,BD,BD,BD,BD,BD,BD,BD,BD,T,T,T],[T,T,T,BD,BD,BD,BD,BD,BD,BD,BD,T,T,T,T,T],[T,T,T,WT,WT,WS,WS,WS,WS,WS,WT,WT,T,T,T,T],[T,WT,WT,WT,WT,WT,WT,WT,WT,LG,LG,WT,WT,WT,T,T],[WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT]
  ];
  var cv = document.getElementById("av"); cv.width = W*S; cv.height = H*S;
  var ctx = cv.getContext("2d");
  for (var r=0; r<H; r++) { for (var c=0; c<W; c++) { if (g[r][c]!=="T") { ctx.fillStyle=g[r][c]; ctx.fillRect(c*S,r*S,S,S); } } }
}());

// ── DATA & LOGIC ──────────────────────────────────────────────────────────
var C = {
  en: {
    title: "Product Designer \xb7 Design Engineer",
    location: "Madrid, Spain",
    profile: ["Senior Product Designer with 12+ years shipping enterprise SaaS","in high-stakes fintech. Expert in design systems \u2014","token architecture, component libraries, design-to-code delivery."],
    projects: [
      {title: "Ria Money Transfer", role: "Lead Product Designer", tags: ["Design Systems", "WCAG 2.1 AA", "B2B SaaS"]},
      {title: "Openbank \xb7 Santander", role: "Design System Specialist", tags: ["React", "Style Dictionary", "UI Analytics"]}
    ]
  },
  es: {
    title: "Diseñador de Producto \xb7 Design Engineer",
    location: "Madrid, España",
    profile: ["Diseñador de Producto Senior con +12 años lanzando SaaS","enterprise en fintech. Experto en sistemas de diseño:","tokens, librerías de componentes, entrega diseño-código."],
    projects: [
      {title: "Ria Money Transfer", role: "Lead Product Designer", tags: ["Sistemas de Diseño", "WCAG 2.1 AA", "B2B SaaS"]},
      {title: "Openbank \xb7 Santander", role: "Especialista en Design System", tags: ["React", "Style Dictionary", "Analítica UI"]}
    ]
  }
};

var currentLang = 'en';
var termEl = document.getElementById("term");

function wait(ms) { return new Promise(res => setTimeout(res, ms)); }
async function typeInto(el, text) {
  for (let char of text) { el.textContent += char; await wait(30); }
}

async function runSequence(lang) {
  termEl.innerHTML = "";
  let d = C[lang];
  
  // Whoami
  let p1 = makePrompt(); await typeInto(p1.cmd, "whoami");
  let o1 = makeOblock(); addLine(o1, "ÁLEX MÉNDEZ", "w"); addLine(o1, d.title, "g"); addLine(o1, d.location);
  
  // About
  let p2 = makePrompt(); await typeInto(p2.cmd, "cat about.txt");
  let o2 = makeOblock(); d.profile.forEach(l => addLine(o2, l));
  
  // Projects
  let p3 = makePrompt(); await typeInto(p3.cmd, "ls work/");
  d.projects.forEach(p => {
    let box = document.createElement("div"); box.className = "pbox show";
    box.innerHTML = `<div class="ptitle">${p.title}</div><div class="prole">${p.role}</div><div class="ptags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`;
    termEl.appendChild(box);
  });
}

function makePrompt() {
  let div = document.createElement("div"); div.className = "pline show";
  div.innerHTML = `<span class="ps1">❯</span> <span class="pcmd"></span><span class="cur"></span>`;
  termEl.appendChild(div);
  return { cmd: div.querySelector(".pcmd"), cur: div.querySelector(".cur") };
}
function makeOblock() { let div = document.createElement("div"); div.className = "oblock show"; termEl.appendChild(div); return div; }
function addLine(cont, txt, cls) { let d = document.createElement("div"); d.className = "oline "+(cls||""); d.textContent = txt; cont.appendChild(d); }

function setLang(lang) {
  currentLang = lang;
  document.getElementById("btn-en").className = lang==='en'?'lang-btn active':'lang-btn';
  document.getElementById("btn-es").className = lang==='es'?'lang-btn active':'lang-btn';
  document.getElementById("hname").textContent = "";
  document.getElementById("htitle").textContent = "";
  document.getElementById("hloc").textContent = "";
  startHeader(lang);
}

async function startHeader(lang) {
  await typeInto(document.getElementById("hname"), "ÁLEX MÉNDEZ");
  await typeInto(document.getElementById("htitle"), C[lang].title);
  await typeInto(document.getElementById("hloc"), C[lang].location);
  runSequence(lang);
}

window.addEventListener("DOMContentLoaded", () => startHeader('en'));
</script>
</body>
</html>
