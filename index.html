<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álex Méndez — Product Designer & Design Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --border:  #30363d;
    --prompt:  #f78166;
    --cmd:     #e6edf3;
    --output:  #8b949e;
    --green:   #3fb950;
    --blue:    #58a6ff;
    --yellow:  #d29922;
    --orange:  #f0883e;
    --dim:     #484f58;
  }

  /* ── SCANLINES ── */
  body {
    background: var(--bg);
    color: var(--cmd);
    font-family: 'VT323', monospace;
    font-size: 18px;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 15px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 3px);
    pointer-events: none;
    z-index: 9999;
  }

  /* ── MAIN WINDOW ── */
  .window {
    width: 100%;
    max-width: 820px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 70px rgba(0,0,0,0.7);
  }
  .titlebar {
    background: #161b22;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 9px;
  }
  .dot { width: 13px; height: 13px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }
  .tlabel { flex: 1; text-align: center; color: var(--output); font-size: 16px; }
  .term { padding: 25px 30px 35px; }

  /* ── HEADER ── */
  .header-row {
    display: flex;
    align-items: center;
    gap: 30px;
    margin-bottom: 30px;
    padding-bottom: 25px;
    border-bottom: 1px solid var(--border);
  }
  .avatar-wrap {
    width: 120px; height: 120px;
    flex-shrink: 0;
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
  }
  .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; image-rendering: pixelated; }
  .hname  { font-size: 42px; color: var(--cmd); line-height: 1; }
  .htitle { font-size: 22px; color: var(--green); margin-top: 2px; }
  .hloc   { font-size: 18px; color: var(--output); margin-top: 4px; }

  /* ── TERMINAL LINES ── */
  .pline { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; opacity: 0; transition: opacity 0.1s; }
  .pline.show { opacity: 1; }
  .ps1  { color: var(--prompt); font-size: 20px; }
  .pcmd { color: var(--cmd); font-size: 20px; }
  .cur  { display: inline-block; width: 10px; height: 20px; background: var(--cmd); animation: blink 1s step-start infinite; margin-left: 2px; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .oblock { margin-bottom: 22px; opacity: 0; transform: translateY(5px); transition: opacity 0.25s, transform 0.25s; }
  .oblock.show { opacity: 1; transform: none; }
  .oline { color: var(--output); font-size: 18px; line-height: 1.6; }
  .oline.w { color: var(--cmd); }
  .oline.g { color: var(--green); }

  /* ── WORK BOXES ── */
  .pbox {
    border: 1px solid var(--border);
    border-left: 4px solid var(--orange);
    background: var(--surface);
    padding: 15px 20px; margin: 10px 0 20px;
    border-radius: 4px;
  }
  .pbox.nda { border-left-color: #f78166; }
  .ptitle { color: var(--orange); font-size: 22px; }
  .pbox.nda .ptitle { color: #f78166; }
  .prole  { color: var(--yellow); font-size: 17px; margin-bottom: 8px; }
  .tag { background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.2); color: var(--blue); font-size: 15px; padding: 2px 10px; border-radius: 4px; margin-right: 6px; display: inline-block; margin-top: 5px; }
  .tag.nda-tag { background: rgba(247,129,102,0.1); border-color: rgba(247,129,102,0.3); color: #f78166; }

  /* ── PORTFOLIO GRID ── */
  .portfolio-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    margin-top: 10px;
  }
  .p-card {
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    display: block;
    transition: border-color 0.2s, transform 0.15s;
  }
  .p-card:hover { border-color: var(--blue); transform: translateY(-2px); }
  .p-card img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    filter: grayscale(30%);
    transition: filter 0.2s;
  }
  .p-card:hover img { filter: grayscale(0%); }
  .p-card-info  { padding: 10px 12px; }
  .p-card-title { color: var(--cmd); font-size: 17px; line-height: 1.3; }
  .p-card-meta  { color: var(--dim); font-size: 14px; margin-top: 3px; }
  .p-card-arrow { color: var(--blue); font-size: 14px; margin-top: 4px; }

  /* ── CONTACT / DOWNLOAD ── */
  .clinks { display: flex; flex-wrap: wrap; gap: 8px 30px; margin-top: 5px; }
  .clinks a { color: var(--blue); text-decoration: none; font-size: 18px; }
  .clinks a:hover { text-decoration: underline; }
  .clinks a::before { content: "-> "; color: var(--dim); }
  .dl-btn { display: inline-block; background: rgba(240,136,62,0.1); border: 1px solid var(--orange); color: var(--orange); padding: 5px 15px; border-radius: 4px; text-decoration: none; margin-top: 10px; transition: 0.2s; font-family: 'VT323', monospace; font-size: 18px; }
  .dl-btn:hover { background: var(--orange); color: #000; }

  /* ── DETAIL OVERLAY ── */
  #detail-view {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  #detail-view.open { transform: translateX(0); }

  .detail-bar {
    background: #161b22;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 12px 20px;
    gap: 14px;
    flex-shrink: 0;
  }
  .detail-dots { display: flex; gap: 7px; }
  .back-btn {
    font-family: 'VT323', monospace;
    font-size: 19px;
    color: var(--prompt);
    background: rgba(247,129,102,0.08);
    border: 1px solid rgba(247,129,102,0.3);
    border-radius: 4px;
    padding: 2px 12px;
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .back-btn:hover { background: rgba(247,129,102,0.18); color: var(--cmd); }
  .detail-bar-cmd { color: var(--output); font-size: 15px; flex: 1; text-align: center; }

  /* detail body scroll area */
  .detail-body {
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
  }
  .detail-inner {
    max-width: 820px;
    margin: 0 auto;
    padding: 28px 30px 50px;
  }

  /* detail project info */
  .detail-title-big {
    font-size: 34px;
    color: var(--orange);
    line-height: 1.1;
    margin-bottom: 4px;
  }
  .detail-role-line {
    font-size: 19px;
    color: var(--yellow);
    margin-bottom: 3px;
  }
  .detail-meta-line {
    font-size: 16px;
    color: var(--dim);
    margin-bottom: 14px;
  }
  .detail-desc {
    font-size: 18px;
    color: var(--output);
    line-height: 1.7;
    margin-bottom: 14px;
    max-width: 680px;
  }
  .detail-tags { margin-bottom: 26px; }

  /* project screenshot */
  .detail-img-wrap {
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 28px;
    background: var(--surface);
  }
  .detail-img-wrap img {
    width: 100%;
    display: block;
  }
  .detail-img-placeholder {
    padding: 40px 30px;
    text-align: center;
    color: var(--dim);
    font-size: 17px;
    line-height: 1.8;
  }

  /* footer nav */
  .detail-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }
  .behance-link {
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: var(--blue);
    text-decoration: none;
  }
  .behance-link::before { content: "-> "; color: var(--dim); }
  .behance-link:hover { text-decoration: underline; }

  .detail-nav { display: flex; gap: 10px; }
  .nav-btn {
    font-family: 'VT323', monospace;
    font-size: 18px;
    background: rgba(88,166,255,0.08);
    border: 1px solid rgba(88,166,255,0.25);
    color: var(--blue);
    padding: 3px 16px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .nav-btn:hover:not(:disabled) { background: rgba(88,166,255,0.18); }
  .nav-btn:disabled { opacity: 0.28; cursor: default; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .header-row { flex-direction: column; text-align: center; }
    .portfolio-grid { grid-template-columns: 1fr 1fr; }
    .detail-inner { padding: 20px 16px 40px; }
    .detail-footer { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>

// ── DETAIL VIEW LOGIC ──────────────────────────────────────────────────────
let currentIdx = 0;

function openDetail(idx) {
  currentIdx = idx;
  const p = PROJECTS[idx];

  // Titlebar command
  document.getElementById("detail-bar-cmd").textContent =
    "❯ cat portfolio/" + p.id + ".md";

  // Info
  document.getElementById("d-title").textContent = p.title;
  document.getElementById("d-role").textContent  = p.role;
  document.getElementById("d-meta").textContent  = p.meta;
  document.getElementById("d-desc").textContent  = p.desc;

  // Tags
  document.getElementById("d-tags").innerHTML =
    p.tags.map(function(t){ return '<span class="tag">' + t + "</span>"; }).join("");

  // Image or placeholder
  var imgWrap = document.getElementById("d-img-wrap");
  if (p.img) {
    imgWrap.innerHTML =
      '<img src="' + p.img + '" alt="' + p.title + '" ' +
      'onerror="this.parentNode.innerHTML=\'<div class=\\\"detail-img-placeholder\\\">Screenshot not found locally.<br>Save <strong>' + p.img + '</strong> to your repo,<br>or <a href=\\\"' + p.behance + '\\\" target=\\\"_blank\\\" style=\\\"color:var(--blue)\\\">view the full project on Behance</a>.</div>\'">';
  } else {
    imgWrap.innerHTML =
      '<div class="detail-img-placeholder">' +
      "This project is under NDA.<br>" +
      'Full case study available on request — ' +
      '<a href="' + p.behance + '" target="_blank" style="color:var(--blue)">preview on Behance</a>.' +
      "</div>";
  }

  // Behance link
  document.getElementById("d-behance").href = p.behance;

  // Nav buttons
  document.getElementById("nav-prev").disabled = (idx === 0);
  document.getElementById("nav-next").disabled = (idx === PROJECTS.length - 1);

  // Scroll to top of detail body
  document.getElementById("detail-body").scrollTop = 0;

  // Open
  document.getElementById("detail-view").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeDetail() {
  document.getElementById("detail-view").classList.remove("open");
  document.body.style.overflow = "";
}

function navigateProject(dir) {
  var next = currentIdx + dir;
  if (next >= 0 && next < PROJECTS.length) openDetail(next);
}

// Keyboard: Escape → close, ArrowLeft/Right → navigate
document.addEventListener("keydown", function(e) {
  var dv = document.getElementById("detail-view");
  if (!dv.classList.contains("open")) return;
  if (e.key === "Escape")     closeDetail();
  if (e.key === "ArrowLeft")  navigateProject(-1);
  if (e.key === "ArrowRight") navigateProject(1);
});

// ── TERMINAL ANIMATION ────────────────────────────────────────────────────
var term = document.getElementById("term");
var wait = function(ms){ return new Promise(function(r){ setTimeout(r, ms); }); };

function typeInto(el, text) {
  return new Promise(function(resolve) {
    var i = 0;
    function tick() {
      if (i < text.length) {
        el.textContent += text.charAt(i++);
        setTimeout(tick, 25 + Math.random() * 20);
      } else { resolve(); }
    }
    tick();
  });
}

function makePromptLine() {
  var line = document.createElement("div");
  line.className = "pline";
  var ps1 = document.createElement("span"); ps1.className = "ps1"; ps1.textContent = "❯";
  var cmd = document.createElement("span"); cmd.className = "pcmd";
  var cur = document.createElement("span"); cur.className = "cur";
  line.appendChild(ps1);
  line.appendChild(document.createTextNode(" "));
  line.appendChild(cmd);
  line.appendChild(cur);
  term.appendChild(line);
  return { line: line, cmd: cmd, cur: cur };
}

async function runCmd(text, outputCallback) {
  var p = makePromptLine();
  await wait(200);
  p.line.classList.add("show");
  await typeInto(p.cmd, text);
  await wait(150);
  p.cur.remove();
  var oblock = document.createElement("div");
  oblock.className = "oblock";
  term.appendChild(oblock);
  outputCallback(oblock);
  requestAnimationFrame(function(){ oblock.classList.add("show"); });
  await wait(600);
}

async function init() {
