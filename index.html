<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álex Méndez — Product Designer & Design Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --border:  #30363d;
    --prompt:  #f78166;
    --cmd:     #e6edf3;
    --output:  #8b949e;
    --green:   #3fb950;
    --blue:    #58a6ff;
    --yellow:  #d29922;
    --orange:  #f0883e;
    --dim:     #484f58;
  }
  body {
    background: var(--bg);
    color: var(--cmd);
    font-family: 'VT323', monospace;
    font-size: 18px;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px;
  }
  .window {
    width: 100%;
    max-width: 860px;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    background: var(--bg);
  }
  .titlebar {
    background: #21262d;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 10px 15px;
    gap: 12px;
  }
  .dots { display: flex; gap: 8px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }
  .tlabel { flex: 1; text-align: center; color: var(--output); font-size: 14px; opacity: 0.8; }
  
  .term { padding: 30px; }
  
  /* Ajuste de Foto Pixel Art */
  .header-row { display: flex; align-items: center; gap: 25px; margin-bottom: 30px; padding-bottom: 25px; border-bottom: 1px solid var(--border); }
  .avatar-wrap { 
    width: 110px; 
    height: 110px; 
    flex-shrink: 0;
    border: 1px solid var(--border);
    background: var(--surface);
  }
  .avatar-wrap img { 
    width: 100%; 
    height: 100%; 
    object-fit: contain; /* Evita que se aplaste */
    image-rendering: pixelated; 
  }

  .hname { font-size: 40px; color: var(--cmd); line-height: 1; }
  .htitle { font-size: 22px; color: var(--green); margin-top: 5px; }
  .hloc { font-size: 18px; color: var(--output); }

  /* Animación Terminal */
  .pline { display: flex; gap: 10px; margin-bottom: 4px; opacity: 0; }
  .pline.show { opacity: 1; }
  .ps1 { color: var(--prompt); }
  .cur { display: inline-block; width: 10px; height: 18px; background: var(--cmd); animation: blink 1s infinite; vertical-align: middle; }
  @keyframes blink { 50% { opacity: 0; } }

  .oblock { margin-bottom: 20px; color: var(--output); }
  .pbox { 
    background: var(--surface); 
    border: 1px solid var(--border); 
    border-left: 4px solid var(--orange);
    padding: 15px; 
    margin: 10px 0 20px;
    border-radius: 0 4px 4px 0;
  }
  .ptitle { color: var(--orange); font-size: 20px; font-weight: bold; }
  .prole { color: var(--yellow); font-size: 17px; margin-bottom: 8px; }
  .tag { display: inline-block; background: rgba(88,166,255,0.1); color: var(--blue); border: 1px solid var(--blue); padding: 0 8px; font-size: 14px; border-radius: 3px; margin-right: 5px; margin-top: 5px; }
  
  .links-row { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 10px; }
  .links-row a { color: var(--blue); text-decoration: none; }
  .links-row a:hover { text-decoration: underline; }
  .links-row a::before { content: "→ "; color: var(--dim); }

  .dl-btn { display: inline-block; border: 1px solid var(--orange); color: var(--orange); padding: 5px 15px; text-decoration: none; border-radius: 4px; margin-top: 10px; }
  .dl-btn:hover { background: var(--orange); color: var(--bg); }
</style>
</head>
<body>

<div class="window">
  <div class="titlebar">
    <div class="dots"><div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div></div>
    <div class="tlabel">amendez83 — bash — 80x24</div>
  </div>
  <div class="term">
    <div class="header-row">
      <div class="avatar-wrap">
        <img src="Captura de pantalla 2026-04-07 a las 10.59.09.jpg" alt="Álex Méndez">
      </div>
      <div>
        <div class="hname">ÁLEX MÉNDEZ</div>
        <div class="htitle">Product Designer · Design Engineer</div>
        <div class="hloc">Madrid, Spain</div>
      </div>
    </div>
    <div id="console"></div>
  </div>
</div>

<script>
const content = [
  { cmd: "whoami", out: "ÁLEX MÉNDEZ\nProduct Designer · Design Engineer\nMadrid, Spain" },
  { cmd: "cat about.txt", out: "Senior Product Designer with 12+ years shipping enterprise SaaS\nin high-stakes fintech. Deep expertise in design systems —\ntoken architecture, component libraries, design-to-code delivery.\nGrowing toward Design Engineering: HTML/CSS, Style Dictionary,\nWCAG 2.1 AA. AI-augmented workflows: Supabase, Claude, GitHub." },
  { cmd: "ls work/", isWork: true },
  { cmd: "ls downloads/", isDL: true },
  { cmd: "cat contact.txt", isContact: true }
];

const workData = [
  {
    title: "Ria Money Transfer · Euronet",
    role: "Lead Product Designer (2022–Present)",
    desc: "Led end-to-end product design for Ria’s internal B2B SaaS platform used by thousands of agents in 160+ countries. Built the token architecture and established WCAG 2.1 AA standards.",
    tags: ["Design Systems", "Figma", "Tokens Studio", "B2B SaaS"]
  },
  {
    title: "Openbank · Santander Group",
    role: "Design System Specialist (2020–2022)",
    desc: "Designed and maintained the end-to-end design system for Spain’s largest digital bank. Achieved 1:1 design-to-code parity with React squads.",
    tags: ["Style Dictionary", "React", "Governance", "UI Analytics"]
  },
  {
    title: "Globant",
    role: "Senior UI Designer (2016–2020)",
    desc: "Designed and optimised UIs for mobile apps and enterprise dashboards. Led discovery workshops and high-fidelity prototypes.",
    tags: ["Product Design", "Mobile", "Enterprise", "Prototyping"]
  }
];

const consoleEl = document.getElementById("console");
const wait = ms => new Promise(r => setTimeout(r, ms));

async function type(text, el) {
  for (const char of text) {
    el.textContent += char;
    await wait(Math.random() * 30 + 20);
  }
}

async function run() {
  for (const item of content) {
    const line = document.createElement("div");
    line.className = "pline show";
    line.innerHTML = `<span class="ps1">❯</span> <span class="cmd-text"></span><span class="cur"></span>`;
    consoleEl.appendChild(line);
    
    await type(item.cmd, line.querySelector(".cmd-text"));
    line.querySelector(".cur").remove();
    await wait(300);

    const out = document.createElement("div");
    out.className = "oblock";
    
    if (item.out) {
      out.innerText = item.out;
    } else if (item.isWork) {
      workData.forEach(w => {
        out.innerHTML += `<div class="pbox">
          <div class="ptitle">${w.title}</div>
          <div class="prole">${w.role}</div>
          <div>${w.desc}</div>
          <div>${w.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        </div>`;
      });
    } else if (item.isDL) {
      out.innerHTML = `<div>2-page PDF — Product Designer & Design Engineer</div>
                       <a href="CV_Alex_Mendez.pdf" class="dl-btn">↓ Download CV</a>`;
    } else if (item.isContact) {
      out.innerHTML = `<div class="links-row">
        <a href="https://linkedin.com/in/amendez83" target="_blank">LinkedIn</a>
        <a href="https://behance.net/amendez" target="_blank">Behance</a>
        <a href="mailto:amendez83@gmail.com">Email</a>
      </div>`;
    }
    
    consoleEl.appendChild(out);
    await wait(500);
  }
}

run();
</script>
</body>
</html>
