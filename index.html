<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álex Méndez — Product Designer & Design Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --border:  #30363d;
    --prompt:  #f78166;
    --cmd:     #e6edf3;
    --output:  #8b949e;
    --green:   #3fb950;
    --blue:    #58a6ff;
    --yellow:  #d29922;
    --orange:  #f0883e;
    --dim:     #484f58;
  }
  body {
    background: var(--bg);
    color: var(--cmd);
    font-family: 'VT323', monospace;
    font-size: 18px;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 15px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 3px);
    pointer-events: none;
    z-index: 9999;
  }
  .window {
    width: 100%;
    max-width: 820px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 70px rgba(0,0,0,0.7);
  }
  .titlebar {
    background: #161b22;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 9px;
  }
  .dot { width: 13px; height: 13px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }
  .tlabel { flex: 1; text-align: center; color: var(--output); font-size: 16px; padding-right: 25px; }

  .term { padding: 25px 30px 35px; }

  /* Header con foto corregida */
  .header-row {
    display: flex;
    align-items: center;
    gap: 30px;
    margin-bottom: 30px;
    padding-bottom: 25px;
    border-bottom: 1px solid var(--border);
  }
  .avatar-wrap {
    width: 120px;
    height: 120px;
    flex-shrink: 0;
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
  }
  .avatar-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Para que no se aplaste */
    image-rendering: pixelated;
  }

  .hname { font-size: 42px; color: var(--cmd); line-height: 1; }
  .htitle { font-size: 22px; color: var(--green); margin-top: 2px; }
  .hloc { font-size: 18px; color: var(--output); margin-top: 4px; }

  /* Terminal animations */
  .pline { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; opacity: 0; transition: opacity 0.1s; }
  .pline.show { opacity: 1; }
  .ps1 { color: var(--prompt); font-size: 20px; font-weight: bold; }
  .pcmd { color: var(--cmd); font-size: 20px; }
  .cur { display: inline-block; width: 10px; height: 20px; background: var(--cmd); animation: blink 1s step-start infinite; margin-left: 2px; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .oblock { margin-bottom: 22px; opacity: 0; transform: translateY(5px); transition: opacity 0.25s, transform 0.25s; }
  .oblock.show { opacity: 1; transform: none; }
  .oline { color: var(--output); font-size: 18px; line-height: 1.6; }
  .oline.w { color: var(--cmd); font-weight: bold; }
  .oline.g { color: var(--green); }

  .pbox {
    border: 1px solid var(--border);
    border-left: 4px solid var(--orange);
    background: var(--surface);
    padding: 15px 20px; margin: 10px 0 20px;
    border-radius: 4px;
    opacity: 0; transform: translateY(5px); transition: 0.3s;
  }
  .pbox.show { opacity: 1; transform: none; }
  .ptitle { color: var(--orange); font-size: 22px; font-weight: bold; }
  .prole { color: var(--yellow); font-size: 17px; margin-bottom: 8px; }
  .tag { background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.2); color: var(--blue); font-size: 15px; padding: 2px 10px; border-radius: 4px; margin-right: 6px; display: inline-block; margin-top: 5px; }

  .clinks { display: flex; flex-wrap: wrap; gap: 8px 30px; margin-top: 5px; }
  .clinks a { color: var(--blue); text-decoration: none; font-size: 18px; }
  .clinks a:hover { text-decoration: underline; }
  .clinks a::before { content: "-> "; color: var(--dim); }

  .dl-btn { display: inline-block; background: rgba(240,136,62,0.1); border: 1px solid var(--orange); color: var(--orange); padding: 5px 15px; border-radius: 4px; text-decoration: none; margin-top: 10px; }
  .dl-btn:hover { background: var(--orange); color: #000; }

  @media (max-width: 600px) {
    .header-row { flex-direction: column; text-align: center; }
  }
</style>
</head>
<body>

<div class="window">
  <div class="titlebar">
    <div class="dot dot-r"></div>
    <div class="dot dot-y"></div>
    <div class="dot dot-g"></div>
    <div class="tlabel">amendez83 — bash — 80×24</div>
  </div>
  <div class="term">
    <div class="header-row">
      <div class="avatar-wrap">
        <img src="fotoAlex.jpg" alt="Álex Méndez">
      </div>
      <div class="htext">
        <div class="hname" id="hname"></div>
        <div class="htitle" id="htitle"></div>
        <div class="hloc" id="hloc"></div>
      </div>
    </div>
    <div id="term"></div>
  </div>
</div>

<script>
"use strict";

const term = document.getElementById("term");
const wait = ms => new Promise(res => setTimeout(res, ms));

async function typeInto(el, text) {
  for (let char of text) {
    el.textContent += char;
    await wait(25 + Math.random() * 20);
  }
}

function makePromptLine() {
  const line = document.createElement("div");
  line.className = "pline";
  line.innerHTML = `<span class="ps1">❯</span> <span class="pcmd"></span><span class="cur"></span>`;
  term.appendChild(line);
  return { line, cmd: line.querySelector(".pcmd"), cur: line.querySelector(".cur") };
}

async function runCmd(text, outputCallback) {
  const p = makePromptLine();
  await wait(200);
  p.line.classList.add("show");
  await typeInto(p.cmd, text);
  await wait(150);
  p.cur.remove();
  const oblock = document.createElement("div");
  oblock.className = "oblock";
  term.appendChild(oblock);
  outputCallback(oblock);
  requestAnimationFrame(() => oblock.classList.add("show"));
  await wait(600);
}

async function init() {
  // Header animation
  await typeInto(document.getElementById("hname"), "ÁLEX MÉNDEZ");
  await typeInto(document.getElementById("htitle"), "Product Designer · Design Engineer");
  await typeInto(document.getElementById("hloc"), "Madrid, Spain");
  await wait(400);

  // whoami
  await runCmd("whoami", (o) => {
    o.innerHTML = `<div class="oline w">ÁLEX MÉNDEZ</div><div class="oline g">Product Designer · Design Engineer</div><div class="oline">Madrid, Spain</div>`;
  });

  // about
  await runCmd("cat about.txt", (o) => {
    o.innerHTML = `
      <div class="oline">Senior Product Designer with 12+ years shipping enterprise SaaS</div>
      <div class="oline">in high-stakes fintech. Deep expertise in design systems —</div>
      <div class="oline">token architecture, component libraries, design-to-code delivery.</div>
      <div class="oline">Growing toward Design Engineering: HTML/CSS, Style Dictionary,</div>
      <div class="oline">WCAG 2.1 AA. AI-augmented workflows: Supabase, Claude, GitHub.</div>`;
  });

  // work
  await runCmd("ls work/", (o) => {
    const projects = [
      { t: "Ria Money Transfer · Euronet", r: "Lead Product Designer (2022–Present)", d: "Led end-to-end product design for Ria's internal B2B SaaS platform used by agents in 160+ countries.", tags: ["Design Systems", "Figma", "WCAG 2.1 AA"] },
      { t: "Openbank · Santander Group", r: "Design System Specialist (2020–2022)", d: "Designed the end-to-end design system for Spain's largest digital bank. 3-layer token architecture.", tags: ["React", "Style Dictionary", "UI Analytics"] },
      { t: "Globant", r: "Senior UI Designer (2016–2020)", d: "Optimised UIs for mobile apps and enterprise dashboards for distributed engineering teams.", tags: ["Product Design", "Mobile", "Prototyping"] }
    ];
    projects.forEach(p => {
      o.innerHTML += `
        <div class="pbox show">
          <div class="ptitle">${p.t}</div>
          <div class="prole">${p.r}</div>
          <div class="oline">${p.d}</div>
          <div class="ptags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        </div>`;
    });
  });

  // downloads
  await runCmd("ls downloads/", (o) => {
    o.innerHTML = `
      <div class="oline">2-page PDF — Product Designer & Design Engineer</div>
      <a href="CV_Alex_Mendez.pdf" class="dl-btn">↓ Download CV</a>`;
  });

  // contact
  await runCmd("cat contact.txt", (o) => {
    o.innerHTML = `
      <div class="clinks">
        <a href="https://linkedin.com/in/amendez83" target="_blank">linkedin.com/in/amendez83</a>
        <a href="https://behance.net/amendez" target="_blank">behance.net/amendez</a>
        <a href="mailto:amendez83@gmail.com">amendez83@gmail.com</a>
      </div>`;
  });

  // Final cursor
  const last = makePromptLine();
  last.line.classList.add("show");
}

window.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
